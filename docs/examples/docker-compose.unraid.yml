# Unraid-specific example. Uses the appdata convention for state and the
# /mnt/user/data/media tree for the ebook library. Edit paths to match your
# share names. Port mapped to 8082 on the host to avoid collisions; the
# container always listens on 8080 internally.
services:
  tome:
    image: ghcr.io/bndct-devops/tome:latest
    container_name: tome
    ports:
      - "8082:8080"
    volumes:
      - /mnt/user/appdata/tome:/data
      - /mnt/user/data/media/ebooks:/books
      - /mnt/user/appdata/tome/bindery:/bindery
    environment:
      # Generate a long random value, or omit and Tome will generate one on
      # first start and save it to /data/secret.key.
      # - TOME_SECRET_KEY=
      # - TOME_HARDCOVER_TOKEN=
      # Use your own Google Books quota instead of the shared anonymous pool
      # (fixes 429/400 "Quota Exceeded", esp. for non-English catalogues):
      # - TOME_GOOGLE_BOOKS_KEY=
    restart: unless-stopped
